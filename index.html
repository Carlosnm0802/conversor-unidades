<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Proyecto: Conversor de Unidades</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>Conversor de Unidades</h1>
        </header>
        <nav>
            <button class="tab activo" data-categoria="moneda">Moneda</button>
            <button class="tab" data-categoria="peso">Peso</button>
            <button class="tab" data-categoria="distancia">Distancia</button>
            <button class="tab" data-categoria="volumen">Volumen</button>
        </nav>
        <main>
            <div id="tarjeta-conversor" class="tarjeta">
                <div id="campo-de">
                    <label for="input-de">Valor a convertir:</label>
                    <input type="number" id="input-de" placeholder="Ingrese el valor">
                    <select id="select-unidad-origen"></select>
                </div>
                <button id="btn-swap">⇅</button>
                <div id="campo-a">
                    <label for="input-a">Valor convertido:</label>
                    <input type="number" id="input-a" placeholder="...">
                    <select id="select-unidad-destino">
                    </select>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
